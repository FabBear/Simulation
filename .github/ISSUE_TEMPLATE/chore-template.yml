name: "🧹 Chore"
description: 의존성, 환경, 문서, 설정 등 MLOps 관리 작업을 요청합니다.
title: "[CHORE] "
labels: ["🧹 Chore"]

body:
  - type: dropdown
    id: component
    attributes:
      label: "대상 영역"
      options:
        - "Environment"
        - "Dependency"
        - "Data Config"
        - "Model Config"
        - "MLflow / Monitoring"
        - "Infra/CI/CD"
        - "Docs"
        - "Repository"
    validations:
      required: true

  - type: textarea
    id: background
    attributes:
      label: "배경"
      description: "왜 필요한 작업인지 간단히 작성해 주세요."
    validations:
      required: true

  - type: textarea
    id: task
    attributes:
      label: "작업 내용"
      description: "진행할 작업을 체크리스트로 작성해 주세요."
      value: |
        - [ ]
        - [ ]
    validations:
      required: true

  - type: textarea
    id: additional_info
    attributes:
      label: "추가 정보"
      description: "추가로 공유할 내용이 있다면 자유롭게 작성해 주세요."
    validations:
      required: false
