name: Build & Push to Harbor

# Harbor 레지스트리에 simulation 이미지를 빌드·푸시한다.
# 빌드 컨텍스트는 repo 안의 simulation/ 디렉터리(Dockerfile이 COPY requirements.txt / COPY . 를 그 기준으로 함).
# 필요한 설정(Settings → Secrets and variables → Actions):
#   Variables: HARBOR_REGISTRY (예: harbor.example.com), HARBOR_PROJECT (예: fabbear)
#   Secrets:   HARBOR_USERNAME, HARBOR_PASSWORD (Harbor 로봇 계정 권장)
on:
  push:
    branches: [main, dev]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-push:
    runs-on: ubuntu-latest
    env:
      IMAGE: ${{ vars.HARBOR_REGISTRY }}/${{ vars.HARBOR_PROJECT }}/simulation
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.HARBOR_REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,format=short
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ./simulation
          file: ./simulation/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
