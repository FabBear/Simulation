name: Label Sync

on:
  workflow_dispatch:
  push:
    branches:
      - dev
      - main
    paths:
      - ".github/labels.yml"
      - ".github/workflows/label-sync.yml"

permissions:
  contents: read
  issues: write

jobs:
  sync:
    name: Sync repository labels
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync labels
        uses: EndBug/label-sync@v2
        with:
          config-file: .github/labels.yml
          delete-other-labels: false
