server:
  port: ${SPRING_PORT:8080}

spring:
  application:
    name: semi-fab-spring-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://127.0.0.1:5432/postgres}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true

management:
  endpoints:
    web:
      base-path: /
      exposure:
        include: health,info,metrics,prometheus

engine:
  mode: ${ENGINE_MODE:java}
  base-url: ${PY_ENGINE_BASE_URL:http://127.0.0.1:8000}
